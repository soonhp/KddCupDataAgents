name: Auto approve work PR

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  approve:
    if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'work' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve PR from work branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const botReview = [...reviews].reverse().find((r) => r.user?.login === 'github-actions[bot]');
            if (botReview?.state === 'APPROVED') {
              core.info(`PR #${pr.number} already approved by github-actions[bot].`);
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Auto-approval for autonomous work->main promotion flow.',
            });

            core.info(`Approved PR #${pr.number}`);
