name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, work]

permissions:
  contents: read

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Byte-compile runner and tests
        run: |
          python -m py_compile \
            runner/evaluation_runner.py \
            runner/task_intelligence.py \
            runner/verification.py \
            runner/agent_review.py \
            runner/semantic_review.py \
            runner/repair_planner.py \
            runner/repair_executor.py \
            runner/retry_orchestrator.py \
            runner/attempt_selector.py \
            runner/failure_taxonomy.py \
            runner/__init__.py \
            tests/test_task_intelligence.py \
            tests/test_repair_executor.py \
            tests/test_retry_orchestrator.py \
            tests/test_failure_taxonomy.py

      - name: Run unittest regression suite
        run: python -m unittest discover -s tests -p 'test_*.py'
